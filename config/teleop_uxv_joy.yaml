# Sample configuration for DS4 joypad:
# - enable: R1
# - arm: cross
# - disarm: triangle
# - kill: circle
# - reset: square
# - gear D: dpad right
# - gear N: dpad down
# - gear R: dpad left
# - gear down: dpad down
# - gear up: dpad up
# - num_inputs[0]: PS button
# - num_inputs[1]: L1
# - num_inputs[2]: options

/teleop_uxv_joy:
  ros__parameters:
    actions:
      arm:
        as_topic: false
        index: 0
        name: '/arm'
      cooldown: 1000
      disarm:
        as_topic: false
        index: 3
        name: '/disarm'
    axes:
      # 1EUR (One-Euro) adaptive low-pass smoothing, applied to all axes.
      # Tuning: raise 'beta' if there is too much lag during deliberate moves;
      # lower 'min_cutoff' if too much jitter remains while the stick is held still.
      # 'output_deadband' flattens residual float (raise to flatten more, at the cost of
      # resolution); 'settle_threshold' snaps the decay tail to exactly 0 near neutral
      # (raise for a crisper stop, lower e.g. to 1e-6 to only kill the denormal tail).
      filter:
        beta: 0.07
        dcutoff: 1.0
        enable: true
        min_cutoff: 0.6
        output_deadband: 0.01
        settle_threshold: 0.001
      lh:
        deadzone: 0.1
        index: 0
        normalize_round: false
        reverse: false
        scale: 1.0
      lv:
        deadzone: 0.1
        index: 1
        normalize_round: false
        reverse: false
        scale: 1.0
      rh:
        deadzone: 0.1
        index: 2
        normalize_round: false
        reverse: false
        scale: 1.0
      rv:
        deadzone: 0.1
        index: 3
        normalize_round: false
        reverse: false
        scale: 1.0
    dua:
      tf_server:
        get_transform: false
        transform_pose: false
        wait_servers: false
    enable_button:
      index: 10
      require: true
    frame_id: joy
    gear:
      automatic: false
      cooldown: 1000
      d:
        index: 14
      down:
        index: 12
      n:
        index: 12
      r:
        index: 13
      up:
        index: 11
    num_inputs:
      indexes: [5, 9, 6]
    services:
      cooldown: 1000
      kill:
        as_topic: false
        index: 1
        name: '/kill'
      reset:
        as_topic: false
        index: 2
        name: '/reset'
    use_sim_time: false
    uxv_command:
      arm: true
      mode: 2
    wait_servers: false
